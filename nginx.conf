server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # /bank/ 경로에 대한 요청 처리
    location /bank/ {
        try_files $uri $uri/ /bank/index.html;
    }

    # /bank (슬래시 없음) 요청을 /bank/ 로 리다이렉트
    location = /bank {
        return 301 /bank/;
    }

    # 루트(/) 접속 시 자동으로 /bank/ 로 리다이렉트
    location / {
        return 301 /bank/;
    }
}

server {
    listen 80;
    
    # 루트를 /usr/share/nginx/html로 설정하고
    # 실제 파일들은 /usr/share/nginx/html/bank에 배치됩니다.
    root /usr/share/nginx/html;
    index index.html;

    location /bank/ {
        try_files $uri $uri/ /bank/index.html;
    }

    # 리다이렉트만 깔끔하게 추가
    location = /bank {
        return 301 /bank/;
    }

    location / {
        return 301 /bank/;
    }
}

server {
    listen 80;
    server_name localhost;

    # 루트 경로를 지정합니다.
    root /usr/share/nginx/html;
    index index.html;

    # /bank/ 로 시작하는 모든 요청을 처리합니다.
    location /bank/ {
        try_files $uri $uri/ /bank/index.html;
    }

    # /bank (슬래시 없음) 요청을 /bank/ 로 리다이렉트합니다.
    location = /bank {
        return 301 $scheme://$http_host/bank/;
    }

    # 루트 접속 시 자동으로 /bank/ 로 리다이렉트합니다.
    location / {
        return 301 $scheme://$http_host/bank/;
    }
}
